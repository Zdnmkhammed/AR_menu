<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Меню</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #0B0B0B 0%, #111111 100%);
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .container { padding: 24px 16px 120px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .title-block h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #D4A45B;
      line-height: 1.1;
      margin: 0;
    }
    .title-block .subtitle {
      font-size: 0.8rem;
      font-weight: 500;
      color: #B4946A;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .lang-switch {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 24px;
      padding: 3px;
      border: 1px solid #2A2A2C;
    }
    .lang-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: #888;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lang-btn.active {
      background: #D4A45B;
      color: #0B0B0B;
    }
    .search-btn {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid #D4A45B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #D4A45B;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-bar {
      display: none;
      margin-bottom: 20px;
    }
    .search-bar.active { display: flex; }
    .search-bar input {
      background: rgba(255,255,255,0.04);
      border: 1px solid #333;
      border-radius: 30px;
      padding: 12px 18px;
      color: #fff;
      width: 100%;
      font-size: 1rem;
      outline: none;
    }
    .search-bar input::placeholder { color: #777; }
    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 28px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .category {
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid #333;
      background: rgba(255,255,255,0.03);
      color: #999;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .category.active {
      background: #D4A45B;
      color: #0B0B0B;
      border-color: #D4A45B;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(212,164,91,0.3);
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .card {
      background: #18181A;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #2A2A2C;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #D4A45B;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }
    .card-preview {
      width: 100%;
      height: 160px;
      background: #222;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      color: #3a3a3c;
      background: #1A1A1C;
    }
    .badge-3d {
      position: absolute;
      top: 12px; right: 12px;
      width: 30px; height: 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid #D4A45B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #D4A45B;
      line-height: 1;
    }
    .card-info { padding: 14px 12px 16px; }
    .card-name {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .card-weight { font-size: 0.75rem; color: #888; }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .card-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #D4A45B;
    }
    .add-btn {
      width: 34px; height: 34px;
      background: transparent;
      border: 1px solid #D4A45B;
      border-radius: 50%;
      color: #D4A45B;
      font-size: 1.2rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-btn:hover { background: rgba(212,164,91,0.2); }

    .detail-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0B0B0B;
      z-index: 10;
      overflow-y: auto;
      display: none;
      max-width: 390px; margin: 0 auto;
    }
    .detail-overlay.open { display: block; }
    .detail-header {
      display: flex; justify-content: space-between; padding: 20px 16px;
      position: sticky; top: 0; background: #0B0B0B; z-index: 2;
    }
    .back-btn, .fav-btn {
      width: 44px; height: 44px;
      background: #18181A;
      border: 1px solid #333;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.2rem; cursor: pointer;
    }
    /* Контейнер для 3D и постера */
    .model-wrapper {
      position: relative;
      width: calc(100% - 32px);
      height: 300px;
      margin: 0 16px 24px;
      border-radius: 24px;
      overflow: hidden;
      background: #202022;
    }
    .detail-model {
      width: 100%;
      height: 100%;
    }
    .detail-model img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .model-poster-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #202022; /* фон пока грузится */
      z-index: 2;
      transition: opacity 0.15s ease;
      border-radius: 24px;
    }
    .model-poster-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
    }
    .model-poster-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .detail-body { padding: 0 16px 40px; }
    .detail-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: #fff; }
    .detail-rating { color: #D4A45B; margin: 10px 0; font-size: 0.9rem; }
    .detail-desc { color: #B7B7B7; font-size: 1rem; margin: 12px 0 20px; }
    .detail-section { margin-bottom: 22px; }
    .detail-section h3 { color: #D4A45B; font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      background: #18181A; border: 1px solid #333; border-radius: 50px;
      padding: 6px 16px; font-size: 0.8rem; color: #ddd;
    }
    .allergen { background: #2e1a1a; border-color: #5a3a3a; color: #E08B45; }
    .detail-price { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: #D4A45B; margin: 24px 0 20px; }
    .ar-btn {
      background: #D4A45B; color: #0B0B0B; border: none; border-radius: 50px;
      padding: 18px; font-size: 1.1rem; font-weight: 600; width: 100%;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 24px; transition: background 0.2s;
    }
    .ar-btn:hover { background: #e0b56a; }
    .back-to-menu { text-align: center; color: #999; padding: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container" id="main-screen">
    <div class="header">
      <div class="title-block">
        <h1 id="restaurant-name">Меню</h1>
        <p class="subtitle" data-i18n="subtitle">FINE DINING</p>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="lang-switch">
          <button class="lang-btn active" data-lang="ru">🇷🇺</button>
          <button class="lang-btn" data-lang="kz">🇰🇿</button>
          <button class="lang-btn" data-lang="en">🇬🇧</button>
        </div>
        <div class="search-btn" id="toggle-search">🔍</div>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <input type="text" placeholder="Найти блюдо..." id="search-input" data-i18n-placeholder="search_placeholder">
    </div>
    <div class="categories" id="categories"></div>
    <div class="grid" id="dish-grid"></div>
  </div>

  <div class="detail-overlay" id="detail-screen">
    <div class="detail-header">
      <button class="back-btn" id="close-detail">←</button>
      <button class="fav-btn">🤍</button>
    </div>
    <!-- Обёртка для 3D и оверлея -->
    <div class="model-wrapper" id="model-wrapper">
      <model-viewer id="detail-model" class="detail-model" src="" poster="" reveal="auto"
        camera-controls auto-rotate environment-image="neutral" shadow-intensity="1.5"
        camera-orbit="0deg 75deg 1.2m"
        ar ar-modes="quick-look scene-viewer webxr" ar-scale="fixed" ar-placement="floor"
        style="opacity: 1;">
      </model-viewer>
      <div class="model-poster-overlay" id="poster-overlay">
        <!-- сюда вставим <img> динамически -->
      </div>
    </div>
    <div class="detail-body">
      <h2 class="detail-title" id="detail-name"></h2>
      <div class="detail-rating" id="detail-rating"></div>
      <p class="detail-desc" id="detail-desc"></p>
      <div class="detail-section">
        <h3 data-i18n="ingredients">Ингредиенты</h3>
        <div class="tags" id="detail-ingredients"></div>
      </div>
      <div class="detail-section">
        <h3 data-i18n="allergens">Аллергены</h3>
        <div class="tags" id="detail-allergens"></div>
      </div>
      <div class="detail-price" id="detail-price"></div>
      <button class="ar-btn" id="detail-ar-btn" data-i18n="view_on_table">🍽 Посмотреть на столе (AR)</button>
      <div class="back-to-menu" id="back-from-detail" data-i18n="back_to_menu">← Назад в меню</div>
    </div>
  </div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  <script>
    const i18n = {
      ru: {
        subtitle: "FINE DINING",
        search_placeholder: "Найти блюдо...",
        ingredients: "Ингредиенты",
        allergens: "Аллергены",
        view_on_table: "🍽 Посмотреть на столе (AR)",
        back_to_menu: "← Назад в меню",
        error_load: "Не удалось загрузить меню.",
        category_all: "Все",
        badge_3d: "3D"
      },
      kz: {
        subtitle: "FINE DINING",
        search_placeholder: "Тағамды іздеу...",
        ingredients: "Құрамы",
        allergens: "Аллергендер",
        view_on_table: "🍽 Үстелден қарау (AR)",
        back_to_menu: "← Мәзірге оралу",
        error_load: "Мәзірді жүктеу мүмкін болмады.",
        category_all: "Барлығы",
        badge_3d: "3D"
      },
      en: {
        subtitle: "FINE DINING",
        search_placeholder: "Search dish...",
        ingredients: "Ingredients",
        allergens: "Allergens",
        view_on_table: "🍽 View on Table (AR)",
        back_to_menu: "← Back to Menu",
        error_load: "Failed to load menu.",
        category_all: "All",
        badge_3d: "3D"
      }
    };

    let currentLang = localStorage.getItem('volumenu_lang') || 'ru';
    const params = new URLSearchParams(window.location.search);
    const restaurant = params.get('r') || 'Coffee-Boom';
    let activeCategory = 'All';
    let allDishes = [];
    let restaurantInfo = {};

    // Текущее открытое блюдо (для предотвращения зависания старой модели)
    let currentDish = null;

    document.getElementById('toggle-search').addEventListener('click', () => {
      document.getElementById('search-bar').classList.toggle('active');
    });

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('volumenu_lang', lang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n[lang] && i18n[lang][key]) el.placeholder = i18n[lang][key];
      });
      if (allDishes.length > 0) {
        renderCategories(allDishes);
        renderDishes(allDishes);
      }
    }

    document.getElementById('lang-switch').addEventListener('click', (e) => {
      if (e.target.classList.contains('lang-btn')) {
        setLang(e.target.dataset.lang);
      }
    });

    const MENU_URL = `/restaurants/${restaurant}/menu.json`;
    fetch(MENU_URL)
      .then(r => { if (!r.ok) throw new Error('Меню не найдено'); return r.json(); })
      .then(data => {
        if (Array.isArray(data)) {
          allDishes = data;
          restaurantInfo = {};
        } else {
          restaurantInfo = data.restaurant || {};
          allDishes = data.dishes || [];
        }
        document.title = `${restaurantInfo.name || 'Меню'} — AR Меню`;
        document.getElementById('restaurant-name').textContent = restaurantInfo.name || 'Меню';
        setLang(currentLang);
        renderCategories(allDishes);
        renderDishes(allDishes);
      })
      .catch(err => {
        document.getElementById('dish-grid').innerHTML =
          `<p style="color:#ff4d4f; text-align:center; grid-column: 1 / -1;">${i18n[currentLang]?.error_load || 'Не удалось загрузить меню'}</p>`;
        console.error(err);
      });

    function renderCategories(dishes) {
      const allCat = i18n[currentLang]?.category_all || 'All';
      const cats = [allCat, ...new Set(dishes.map(d => d.category || 'Other'))];
      const container = document.getElementById('categories');
      container.innerHTML = cats.map(c => `
        <div class="category ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c}</div>
      `).join('');
      container.querySelectorAll('.category').forEach(el => {
        el.addEventListener('click', () => {
          activeCategory = el.dataset.cat;
          renderCategories(allDishes);
          const filtered = activeCategory === allCat ? allDishes : allDishes.filter(d => d.category === activeCategory || (activeCategory === 'Other' && !d.category));
          renderDishes(filtered);
        });
      });
    }

    function renderDishes(dishes) {
      const grid = document.getElementById('dish-grid');
      const badge3d = i18n[currentLang]?.badge_3d || '3D';
      grid.innerHTML = dishes.map(d => {
        const imagePath = d.image ? `/restaurants/${restaurant}/${d.image}` : '';
        const preview = imagePath
          ? `<img src="${imagePath}" alt="${d.name}" loading="lazy">`
          : `<div class="card-placeholder">🍽</div>`;
        return `
          <div class="card" data-id="${d.id}">
            <div class="card-preview">
              ${preview}
              ${d.model ? `<div class="badge-3d">${badge3d}</div>` : ''}
            </div>
            <div class="card-info">
              <div class="card-name">${d.name}</div>
              <div class="card-desc">${d.description}</div>
              <div class="card-meta"><span class="card-weight">${d.weight || ''}</span></div>
              <div class="card-footer">
                <span class="card-price">${d.price} ₸</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', (e) => {
          openDetail(parseInt(card.dataset.id));
        });
      });
    }

    // Единый обработчик загрузки модели
    const modelViewer = document.getElementById('detail-model');
    modelViewer.addEventListener('load', () => {
      // Проверяем, что загруженная модель соответствует текущему выбранному блюду
      if (currentDish && modelViewer.src.includes(currentDish.model)) {
        // Показать 3D, скрыть постер
        const overlay = document.getElementById('poster-overlay');
        overlay.classList.add('hidden');
        modelViewer.style.opacity = '1';
      }
    });

    function openDetail(id) {
      const dish = allDishes.find(d => d.id === id);
      if (!dish) return;
      
      // Обновляем текущее блюдо
      currentDish = dish;
      
      // Показываем интерфейс
      document.getElementById('detail-screen').classList.add('open');
      document.getElementById('main-screen').style.display = 'none';
      document.getElementById('detail-name').textContent = dish.name;
      document.getElementById('detail-desc').textContent = dish.description;
      document.getElementById('detail-price').textContent = `${dish.price} ₸`;
      document.getElementById('detail-rating').innerHTML = '⭐ 4.8';
      document.getElementById('detail-ingredients').innerHTML =
        (dish.ingredients || []).map(i => `<span class="tag">${i}</span>`).join('');
      document.getElementById('detail-allergens').innerHTML =
        (dish.allergens || []).map(a => `<span class="tag allergen">${a}</span>`).join('');

      // Сброс и показ постера
      const mv = document.getElementById('detail-model');
      const overlay = document.getElementById('poster-overlay');
      
      // Убираем предыдущую модель
      mv.src = '';
      mv.style.opacity = '0';
      
      // Вставляем постер (фото)
      const posterUrl = dish.image ? `/restaurants/${restaurant}/${dish.image}` : '';
      if (posterUrl) {
        overlay.innerHTML = `<img src="${posterUrl}" alt="${dish.name}">`;
        overlay.classList.remove('hidden');
      } else {
        overlay.innerHTML = '<div class="card-placeholder">🍽</div>';
        overlay.classList.remove('hidden');
      }
      
      // Загружаем новую модель (если есть)
      if (dish.model) {
        setTimeout(() => {
          // Проверяем, не переключилось ли блюдо за время таймаута
          if (currentDish && currentDish.id === dish.id) {
            mv.src = `/restaurants/${restaurant}/${dish.model}`;
          }
        }, 50);
      }
      
      // Применяем масштаб после загрузки
      if (dish.scale) {
        mv.addEventListener('load', function setScale() {
          if (currentDish && currentDish.id === dish.id) {
            mv.scale = `${dish.scale} ${dish.scale} ${dish.scale}`;
          }
        }, { once: true });
      }

      // Проверка поддержки AR
      const arBtn = document.getElementById('detail-ar-btn');
      if (mv.canActivateAR) {
        arBtn.style.display = 'flex';
        arBtn.onclick = () => {
          mv.activateAR().catch(err => alert('AR не запустился: ' + err));
        };
      } else {
        arBtn.style.display = 'none';
      }
    }

    function closeDetail() {
      document.getElementById('detail-screen').classList.remove('open');
      document.getElementById('main-screen').style.display = 'block';
      // Сброс текущего блюда
      currentDish = null;
      const mv = document.getElementById('detail-model');
      mv.src = '';
      document.getElementById('poster-overlay').innerHTML = '';
      document.getElementById('poster-overlay').classList.remove('hidden');
    }
    document.getElementById('close-detail').addEventListener('click', closeDetail);
    document.getElementById('back-from-detail').addEventListener('click', closeDetail);
    document.getElementById('search-input').addEventListener('input', () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allDishes.filter(d => (d.name?.toLowerCase().includes(query) || d.description?.toLowerCase().includes(query)));
      renderDishes(filtered);
    });
  </script>
</body>
</html>
